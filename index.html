<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EDA Project Outputs</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f4f4f4;
      margin:0;
      padding:20px;
    }

    h1{
      text-align:center;
      color:#007bff;
    }

    .gallery{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(300px,1fr));
      gap:20px;
      margin-top:30px;
    }

    .card{
      background:white;
      padding:15px;
      border-radius:10px;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
      text-align:center;
    }

    .card img{
      width:100%;
      border-radius:10px;
    }

    .card h3{
      margin-top:10px;
      color:#333;
    }
  </style>
</head>

<body>

  <h1>EDA Project - Visualization Outputs</h1>

  <div class="gallery">

    <div class="card">
      <img src="output1.png" alt="Output 1">
      <h3>Histogram Analysis</h3>
    </div>

    <div class="card">
      <img src="output2.png" alt="Output 2">
      <h3>Correlation Heatmap</h3>
    </div>

    <div class="card">
      <img src="output3.png" alt="Output 3">
      <h3>Scatter Plot</h3>
    </div>

    <div class="card">
      <img src="output4.png" alt="Output 4">
      <h3>Box Plot Analysis</h3>
    </div>

    <div class="card">
      <img src="output5.png" alt="Output 5">
      <h3>Count Plot</h3>
    </div>

  </div>

</body>
</html>
